<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 860" width="100%" height="100%"
  style="background-color:#F8F9FA; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
    <!-- Arrowheads: refX=10 avoids tip intruding into nodes; pair with endpoint padding -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E2E8F0"/>
    </pattern>
    <style>
      .box-amber { fill: #FEF7E0; stroke: #FDE68A; stroke-width: 2px; }
      .box-purple { fill: #EBE0FF; stroke: #D8B4FE; stroke-width: 2px; }
      .box-blue { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 2px; }
      .box-rose { fill: #FCE8E6; stroke: #FECACA; stroke-width: 2px; }
      .box-green { fill: #DCFCE7; stroke: #BBF7D0; stroke-width: 2px; }
      .box-neutral { fill: #FFFFFF; stroke: #D1D5DB; stroke-width: 2px; }
      .box-group { fill: rgba(255, 255, 255, 0.45); stroke: #CBD5E1; stroke-width: 2px; stroke-dasharray: 8 8; }
      .diamond { fill: #FFFFFF; stroke: #D1D5DB; stroke-width: 2px; }

      .text-title { font-size: 28px; font-weight: 800; fill: #111827; dominant-baseline: middle; letter-spacing: -0.5px; }
      .text-subtitle { font-size: 14px; font-weight: 500; fill: #4B5563; dominant-baseline: middle; }
      .text-main { font-size: 14px; font-weight: 600; fill: #1F2937; dominant-baseline: middle; letter-spacing: 0.2px; }
      .text-small { font-size: 12px; font-weight: 500; fill: #6B7280; dominant-baseline: middle; }

      .line { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .pill { fill: #FFFFFF; opacity: 0.82; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#dot-grid)"/>

  <text x="80" y="70" class="text-title" text-anchor="start">Router 路由图（示意）</text>
  <text x="80" y="104" class="text-subtitle" text-anchor="start">优先级：风险命中先停下确认；方向不清先 Brainstorm；缺证据先 Research；否则按 Level 进入 Plan/Execute。</text>

  <rect x="60" y="140" width="1480" height="680" rx="24" class="box-group" filter="url(#shadow)"/>

  <!-- ====================================================== -->
  <!-- Edges (draw BEFORE nodes to avoid lines covering text) -->
  <!-- Endpoint padding used: EDGE_PAD=10                     -->
  <!-- ====================================================== -->
  <g>
    <!-- input -> risk (add more vertical breathing room vs previous) -->
    <path d="M 800 242 V 260" class="line" marker-end="url(#arrow)"/>

    <!-- risk yes -> stop -->
    <path d="M 910 330 H 1130" class="line" marker-end="url(#arrow)"/>
    <rect x="990" y="306" width="56" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1018" y="315" class="text-small" text-anchor="middle">命中</text>

    <!-- risk no -> clarity -->
    <path d="M 800 390 V 400" class="line" marker-end="url(#arrow)"/>
    <rect x="812" y="382" width="66" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="845" y="391" class="text-small" text-anchor="middle">未命中</text>

    <!-- clarity no -> brainstorm -->
    <path d="M 690 470 H 490" class="line" marker-end="url(#arrow)"/>
    <rect x="538" y="446" width="44" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="560" y="455" class="text-small" text-anchor="middle">不清</text>

    <!-- clarity yes -> evidence -->
    <path d="M 800 530 V 560" class="line" marker-end="url(#arrow)"/>
    <rect x="812" y="540" width="44" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="834" y="549" class="text-small" text-anchor="middle">清晰</text>

    <!-- evidence yes -> research -->
    <path d="M 690 630 H 490" class="line" marker-end="url(#arrow)"/>
    <rect x="548" y="606" width="24" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="560" y="615" class="text-small" text-anchor="middle">是</text>

    <!-- evidence no -> level -->
    <path d="M 800 690 V 700" class="line" marker-end="url(#arrow)"/>
    <rect x="812" y="680" width="24" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="824" y="689" class="text-small" text-anchor="middle">否</text>

    <!-- level yes -> plan -->
    <path d="M 690 770 H 490" class="line" marker-end="url(#arrow)"/>
    <rect x="548" y="746" width="24" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="560" y="755" class="text-small" text-anchor="middle">是</text>

    <!-- level no -> execute(light) -->
    <path d="M 910 770 H 1130" class="line" marker-end="url(#arrow)"/>
    <rect x="1010" y="746" width="24" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1022" y="755" class="text-small" text-anchor="middle">否</text>
  </g>

  <!-- Nodes -->
  <g>
    <!-- Input -->
    <rect x="670" y="170" width="260" height="72" rx="18" class="box-amber" filter="url(#shadow)"/>
    <text x="800" y="206" class="text-main" text-anchor="middle">用户输入</text>

    <!-- Risk scan diamond (shifted down to avoid overlap with input arrowhead) -->
    <polygon points="800,270 910,330 800,390 690,330" class="diamond" filter="url(#shadow)"/>
    <text x="800" y="322" class="text-main" text-anchor="middle">风险扫描</text>

    <!-- STOP -->
    <rect x="1140" y="270" width="320" height="72" rx="18" class="box-rose" filter="url(#shadow)"/>
    <text x="1300" y="298" class="text-main" text-anchor="middle">停下：说明风险</text>
    <text x="1300" y="320" class="text-small" text-anchor="middle">让用户确认/授权</text>

    <!-- Clarity diamond -->
    <polygon points="800,410 910,470 800,530 690,470" class="diamond" filter="url(#shadow)"/>
    <text x="800" y="462" class="text-main" text-anchor="middle">方向/方案清晰？</text>

    <!-- Brainstorm -->
    <rect x="220" y="430" width="260" height="72" rx="18" class="box-purple" filter="url(#shadow)"/>
    <text x="350" y="466" class="text-main" text-anchor="middle">Brainstorm</text>

    <!-- Evidence diamond -->
    <polygon points="800,570 910,630 800,690 690,630" class="diamond" filter="url(#shadow)"/>
    <text x="800" y="622" class="text-main" text-anchor="middle">缺资料/需证据？</text>

    <!-- Research -->
    <rect x="220" y="590" width="260" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="350" y="626" class="text-main" text-anchor="middle">Research</text>

    <!-- Level diamond -->
    <polygon points="800,710 910,770 800,830 690,770" class="diamond" filter="url(#shadow)"/>
    <text x="800" y="762" class="text-main" text-anchor="middle">Level ≥ L2？</text>

    <!-- Plan / Execute(light) -->
    <rect x="220" y="730" width="260" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="350" y="766" class="text-main" text-anchor="middle">Plan</text>

    <rect x="1140" y="730" width="320" height="72" rx="18" class="box-rose" filter="url(#shadow)"/>
    <text x="1300" y="758" class="text-main" text-anchor="middle">Execute（轻量）</text>
    <text x="1300" y="780" class="text-small" text-anchor="middle">Simple / L1</text>
  </g>
</svg>
