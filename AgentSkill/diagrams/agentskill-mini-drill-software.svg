<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 860" width="100%" height="100%"
  style="background-color:#F8F9FA; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
    <!-- Arrowheads: refX=10 avoids tip intruding into nodes; pair with endpoint padding -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E2E8F0"/>
    </pattern>
    <style>
      .box-amber { fill: #FEF7E0; stroke: #FDE68A; stroke-width: 2px; }
      .box-purple { fill: #EBE0FF; stroke: #D8B4FE; stroke-width: 2px; }
      .box-blue { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 2px; }
      .box-rose { fill: #FCE8E6; stroke: #FECACA; stroke-width: 2px; }
      .box-green { fill: #DCFCE7; stroke: #BBF7D0; stroke-width: 2px; }
      .box-group { fill: rgba(255, 255, 255, 0.45); stroke: #CBD5E1; stroke-width: 2px; stroke-dasharray: 8 8; }
      .diamond { fill: #FFFFFF; stroke: #D1D5DB; stroke-width: 2px; }

      .text-title { font-size: 28px; font-weight: 800; fill: #111827; dominant-baseline: middle; letter-spacing: -0.5px; }
      .text-subtitle { font-size: 14px; font-weight: 500; fill: #4B5563; dominant-baseline: middle; }
      .text-main { font-size: 14px; font-weight: 600; fill: #1F2937; dominant-baseline: middle; letter-spacing: 0.2px; }
      .text-small { font-size: 12px; font-weight: 500; fill: #6B7280; dominant-baseline: middle; }

      .line { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#dot-grid)"/>

  <text x="80" y="70" class="text-title" text-anchor="start">迷你演练：软件（从零搭建/实现）</text>
  <text x="80" y="104" class="text-subtitle" text-anchor="start">Router → Brainstorm → Plan/Task → 执行授权 → Execute → Validate → Review</text>

  <rect x="60" y="140" width="1480" height="680" rx="24" class="box-group" filter="url(#shadow)"/>

  <!-- ====================================================== -->
  <!-- Edges (draw BEFORE nodes; endpoint padding EDGE_PAD=10) -->
  <!-- ====================================================== -->
  <g>
    <path d="M 800 272 V 294" class="line" marker-end="url(#arrow)"/>
    <path d="M 800 376 V 398" class="line" marker-end="url(#arrow)"/>
    <path d="M 800 480 V 490" class="line" marker-end="url(#arrow)"/>
    <path d="M 800 550 V 566" class="line" marker-end="url(#arrow)"/>
    <path d="M 800 648 V 670" class="line" marker-end="url(#arrow)"/>
    <path d="M 800 752 V 774" class="line" marker-end="url(#arrow)"/>
  </g>

  <!-- Nodes (w=320,h=72, gap=32, x=640) -->
  <g>
    <rect x="640" y="200" width="320" height="72" rx="18" class="box-amber" filter="url(#shadow)"/>
    <text x="800" y="236" class="text-main" text-anchor="middle">Router</text>
    <text x="800" y="258" class="text-small" text-anchor="middle">Software + L2/L3</text>

    <rect x="640" y="304" width="320" height="72" rx="18" class="box-purple" filter="url(#shadow)"/>
    <text x="800" y="340" class="text-main" text-anchor="middle">Brainstorm</text>
    <text x="800" y="362" class="text-small" text-anchor="middle">架构/选型/取舍</text>

    <rect x="640" y="408" width="320" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="800" y="444" class="text-main" text-anchor="middle">Plan / Task</text>
    <text x="800" y="466" class="text-small" text-anchor="middle">边界/接口/验证路径</text>

    <polygon points="800,500 840,520 800,540 760,520" class="diamond" filter="url(#shadow)"/>
    <text x="800" y="516" class="text-small" text-anchor="middle">执行授权</text>
    <text x="800" y="534" class="text-small" text-anchor="middle">开始执行?</text>

    <rect x="640" y="576" width="320" height="72" rx="18" class="box-rose" filter="url(#shadow)"/>
    <text x="800" y="612" class="text-main" text-anchor="middle">Execute</text>
    <text x="800" y="634" class="text-small" text-anchor="middle">按任务组推进</text>

    <rect x="640" y="680" width="320" height="72" rx="18" class="box-green" filter="url(#shadow)"/>
    <text x="800" y="716" class="text-main" text-anchor="middle">Validate</text>
    <text x="800" y="738" class="text-small" text-anchor="middle">检查点/里程碑/最终验证</text>

    <rect x="640" y="784" width="320" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="800" y="820" class="text-main" text-anchor="middle">Review</text>
    <text x="800" y="842" class="text-small" text-anchor="middle">评分 + 整改</text>
  </g>
</svg>
