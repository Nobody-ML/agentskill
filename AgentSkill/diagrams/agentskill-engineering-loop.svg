<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" width="100%" height="100%"
  style="background-color:#F8F9FA; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <!-- Modern Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>

    <!-- Arrowheads -->
    <!-- Arrowheads: refX=10 avoids tip intruding into nodes; pair with endpoint padding -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#F472B6"/>
    </marker>

    <!-- Dot Grid -->
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E2E8F0"/>
    </pattern>

    <style>
      .box-amber { fill: #FEF7E0; stroke: #FDE68A; stroke-width: 2px; }
      .box-purple { fill: #EBE0FF; stroke: #D8B4FE; stroke-width: 2px; }
      .box-blue { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 2px; }
      .box-rose { fill: #FCE8E6; stroke: #FECACA; stroke-width: 2px; }
      .box-green { fill: #DCFCE7; stroke: #BBF7D0; stroke-width: 2px; }
      .box-group { fill: rgba(255, 255, 255, 0.45); stroke: #CBD5E1; stroke-width: 2px; stroke-dasharray: 8 8; }

      .text-title { font-size: 28px; font-weight: 800; fill: #111827; dominant-baseline: middle; letter-spacing: -0.5px; }
      .text-subtitle { font-size: 14px; font-weight: 500; fill: #4B5563; dominant-baseline: middle; }
      .text-group { font-size: 18px; font-weight: 700; fill: #DB2777; dominant-baseline: middle; }
      .text-main { font-size: 14px; font-weight: 600; fill: #1F2937; dominant-baseline: middle; letter-spacing: 0.2px; }
      .text-small { font-size: 12px; font-weight: 500; fill: #6B7280; dominant-baseline: middle; }

      .line { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-hl { stroke: #F472B6; stroke-width: 2.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#dot-grid)"/>

  <!-- Title -->
  <text x="80" y="70" class="text-title" text-anchor="start">工程实践的最小闭环</text>
  <text x="80" y="104" class="text-subtitle" text-anchor="start">Evidence-driven：断言 → 计划 → 实现 → 证据 → 评审 → 迭代/交付</text>

  <!-- Group container -->
  <rect x="60" y="140" width="1480" height="220" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="166" class="text-group" text-anchor="start">Loop（以证据驱动迭代）</text>

  <!-- ====================================================== -->
  <!-- Edges (draw BEFORE nodes; endpoint padding EDGE_PAD=10) -->
  <!-- ====================================================== -->
  <g>
    <path d="M 270 250 H 296" class="line" marker-end="url(#arrow)"/>
    <path d="M 476 250 H 502" class="line" marker-end="url(#arrow)"/>
    <path d="M 682 250 H 708" class="line" marker-end="url(#arrow)"/>
    <path d="M 888 250 H 914" class="line" marker-end="url(#arrow)"/>
    <path d="M 1094 250 H 1120" class="line" marker-end="url(#arrow)"/>
    <path d="M 1300 250 H 1326" class="line" marker-end="url(#arrow)"/>

    <!-- learning loop: Review -> Plan (end above node to avoid overlap) -->
    <path d="M 1215 214 V 172 Q 1215 160 1203 160 H 609 Q 597 160 597 172 V 204" class="line-hl" marker-end="url(#arrow-hl)"/>
    <text x="906" y="146" class="text-small" text-anchor="middle">学到新信息 → 回到 Plan</text>
  </g>

  <!-- Nodes -->
  <!-- geometry: w=170, h=72, gap=36, y=214 -->
  <g>
    <rect x="100" y="214" width="170" height="72" rx="16" class="box-amber" filter="url(#shadow)"/>
    <text x="185" y="250" class="text-main" text-anchor="middle">问题/目标</text>

    <rect x="306" y="214" width="170" height="72" rx="16" class="box-purple" filter="url(#shadow)"/>
    <text x="391" y="244" class="text-main" text-anchor="middle">验收断言</text>
    <text x="391" y="266" class="text-small" text-anchor="middle">AC / 契约</text>

    <rect x="512" y="214" width="170" height="72" rx="16" class="box-blue" filter="url(#shadow)"/>
    <text x="597" y="244" class="text-main" text-anchor="middle">Plan / Task</text>
    <text x="597" y="266" class="text-small" text-anchor="middle">拆分与边界</text>

    <rect x="718" y="214" width="170" height="72" rx="16" class="box-rose" filter="url(#shadow)"/>
    <text x="803" y="244" class="text-main" text-anchor="middle">最小实现</text>
    <text x="803" y="266" class="text-small" text-anchor="middle">一次一件事</text>

    <rect x="924" y="214" width="170" height="72" rx="16" class="box-green" filter="url(#shadow)"/>
    <text x="1009" y="244" class="text-main" text-anchor="middle">验证证据</text>
    <text x="1009" y="266" class="text-small" text-anchor="middle">输出 / 日志</text>

    <rect x="1130" y="214" width="170" height="72" rx="16" class="box-blue" filter="url(#shadow)"/>
    <text x="1215" y="244" class="text-main" text-anchor="middle">评审/整改</text>
    <text x="1215" y="266" class="text-small" text-anchor="middle">P0/P1/P2</text>

    <rect x="1336" y="214" width="170" height="72" rx="16" class="box-green" filter="url(#shadow)"/>
    <text x="1421" y="244" class="text-main" text-anchor="middle">交付</text>
    <text x="1421" y="266" class="text-small" text-anchor="middle">PASS</text>
  </g>
</svg>
