<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" width="100%" height="100%"
  style="background-color:#F8F9FA; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>

    <!-- Arrowheads: refX=10 avoids tip intruding into nodes; pair with endpoint padding -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#F472B6"/>
    </marker>

    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E2E8F0"/>
    </pattern>

    <style>
      .box-amber { fill: #FEF7E0; stroke: #FDE68A; stroke-width: 2px; }
      .box-purple { fill: #EBE0FF; stroke: #D8B4FE; stroke-width: 2px; }
      .box-blue { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 2px; }
      .box-rose { fill: #FCE8E6; stroke: #FECACA; stroke-width: 2px; }
      .box-green { fill: #DCFCE7; stroke: #BBF7D0; stroke-width: 2px; }
      .box-group { fill: rgba(255, 255, 255, 0.45); stroke: #CBD5E1; stroke-width: 2px; stroke-dasharray: 8 8; }
      .diamond { fill: #FFFFFF; stroke: #D1D5DB; stroke-width: 2px; }

      .text-title { font-size: 28px; font-weight: 800; fill: #111827; dominant-baseline: middle; letter-spacing: -0.5px; }
      .text-subtitle { font-size: 14px; font-weight: 500; fill: #4B5563; dominant-baseline: middle; }
      .text-group { font-size: 18px; font-weight: 700; fill: #DB2777; dominant-baseline: middle; }
      .text-main { font-size: 14px; font-weight: 600; fill: #1F2937; dominant-baseline: middle; letter-spacing: 0.2px; }
      .text-small { font-size: 12px; font-weight: 500; fill: #6B7280; dominant-baseline: middle; }

      .line { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-hl { stroke: #F472B6; stroke-width: 2.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-dashed { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 6; }

      .pill { fill: #FFFFFF; opacity: 0.82; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#dot-grid)"/>

  <!-- Title -->
  <text x="80" y="70" class="text-title" text-anchor="start">主流程（从输入到交付）</text>
  <text x="80" y="104" class="text-subtitle" text-anchor="start">核心闭环：Plan → 执行授权 → Execute/Write → Validate → Review；分支由 Router 决定；返工策略由“验证×评分”门禁控制。</text>

  <!-- Group containers (behind everything) -->
  <rect x="60" y="130" width="1480" height="400" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="156" class="text-group" text-anchor="start">Routing &amp; Planning</text>

  <rect x="60" y="560" width="1480" height="430" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="586" class="text-group" text-anchor="start">Execution Loop</text>

  <!-- ====================================================== -->
  <!-- Edges (draw BEFORE nodes to avoid lines covering text) -->
  <!-- Endpoint padding used: EDGE_PAD=10, Corner radius: R=12 -->
  <!-- ====================================================== -->
  <g>
    <!-- input -> router -->
    <path d="M 800 242 V 260" class="line" marker-end="url(#arrow)"/>

    <!-- router -> plan (L2/L3) -->
    <path d="M 800 342 V 395" class="line" marker-end="url(#arrow)"/>
    <rect x="812" y="368" width="54" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="839" y="377" class="text-small" text-anchor="middle">L2/L3</text>

    <!-- router -> execute(light) (Simple/L1) -->
    <path d="M 910 306 H 1028 Q 1040 306 1040 318 V 429 Q 1040 441 1052 441 H 1150" class="line" marker-end="url(#arrow)"/>
    <rect x="1040" y="418" width="86" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1083" y="427" class="text-small" text-anchor="middle">Simple/L1</text>

    <!-- router fan-out trunk (no arrowhead) -->
    <path d="M 690 306 H 620" class="line"/>

    <!-- router -> brainstorm -->
    <path d="M 620 306 H 572 Q 560 306 560 318 V 384 Q 560 396 548 396 H 450" class="line" marker-end="url(#arrow)"/>
    <rect x="560" y="366" width="74" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="597" y="375" class="text-small" text-anchor="middle">方向不清</text>

    <!-- router -> research -->
    <path d="M 620 306 H 604 Q 592 306 592 318 V 474 Q 592 486 580 486 H 450" class="line" marker-end="url(#arrow)"/>
    <rect x="560" y="456" width="62" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="591" y="465" class="text-small" text-anchor="middle">缺证据</text>

    <!-- brainstorm -> plan -->
    <path d="M 440 396 H 548 Q 560 396 560 408 V 418 Q 560 430 572 430 H 680" class="line" marker-end="url(#arrow)"/>
    <!-- research -> plan -->
    <path d="M 440 486 H 548 Q 560 486 560 474 V 464 Q 560 452 572 452 H 680" class="line" marker-end="url(#arrow)"/>

    <!-- plan -> auth gate -> execute -> validate -> review -->
    <path d="M 800 477 V 510" class="line" marker-end="url(#arrow)"/>
    <path d="M 800 580 V 610" class="line" marker-end="url(#arrow)"/>
    <path d="M 800 692 V 720" class="line" marker-end="url(#arrow)"/>
    <path d="M 800 802 V 830" class="line" marker-end="url(#arrow)"/>

    <!-- review -> done (PASS) (upper lane) -->
    <path d="M 910 864 H 1150" class="line" marker-end="url(#arrow)"/>
    <rect x="1000" y="842" width="44" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1022" y="851" class="text-small" text-anchor="middle">PASS</text>

    <!-- review -> ask (NEEDS_USER_DECISION) (lower lane, avoid pass arrow) -->
    <path d="M 910 888 H 1028 Q 1040 888 1040 876 V 768 Q 1040 756 1052 756 H 1150" class="line" marker-end="url(#arrow)"/>
    <rect x="1034" y="730" width="206" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1137" y="739" class="text-small" text-anchor="middle">NEEDS_USER_DECISION</text>

    <!-- blocked loop: review -> execute (highlight) -->
    <path d="M 690 876 H 632 Q 620 876 620 864 V 668 Q 620 656 632 656 H 680" class="line-hl" marker-end="url(#arrow-hl)"/>
    <rect x="540" y="668" width="64" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="572" y="677" class="text-small" text-anchor="middle">BLOCKED</text>

    <!-- ask -> done (accept) -->
    <path d="M 1270 792 V 830" class="line" marker-end="url(#arrow)"/>
    <rect x="1284" y="812" width="74" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1321" y="821" class="text-small" text-anchor="middle">接受现状</text>

    <!-- ask -> plan (rework) : route outside to avoid crossings -->
    <path d="M 1270 720 H 1488 Q 1500 720 1500 708 V 232 Q 1500 220 1488 220 H 892 Q 880 220 880 232 V 395" class="line" marker-end="url(#arrow)"/>
    <rect x="1264" y="190" width="152" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1340" y="199" class="text-small" text-anchor="middle">返工 → 回到 Plan</text>
  </g>

  <!-- Nodes (w=220,h=72) -->
  <g>
    <!-- user input -->
    <rect x="690" y="170" width="220" height="72" rx="18" class="box-amber" filter="url(#shadow)"/>
    <text x="800" y="206" class="text-main" text-anchor="middle">用户输入 / 材料</text>

    <!-- router -->
    <rect x="690" y="270" width="220" height="72" rx="18" class="box-amber" filter="url(#shadow)"/>
    <text x="800" y="306" class="text-main" text-anchor="middle">Router</text>
    <text x="800" y="328" class="text-small" text-anchor="middle">Track × WorkType × Level × 风险</text>

    <!-- brainstorm / research -->
    <rect x="220" y="360" width="220" height="72" rx="18" class="box-purple" filter="url(#shadow)"/>
    <text x="330" y="396" class="text-main" text-anchor="middle">Brainstorm</text>
    <text x="330" y="418" class="text-small" text-anchor="middle">方向/方案不清</text>

    <rect x="220" y="450" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="330" y="486" class="text-main" text-anchor="middle">Research</text>
    <text x="330" y="508" class="text-small" text-anchor="middle">缺资料/需证据</text>

    <!-- plan / execute(light) -->
    <rect x="690" y="405" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="800" y="441" class="text-main" text-anchor="middle">Plan</text>
    <text x="800" y="463" class="text-small" text-anchor="middle">Plan.md + Task.md</text>

    <!-- auth gate (Execution Authorization) -->
    <polygon points="800,520 870,545 800,570 730,545" class="diamond" filter="url(#shadow)"/>
    <text x="800" y="540" class="text-small" text-anchor="middle">执行授权</text>
    <text x="800" y="560" class="text-small" text-anchor="middle">开始执行?</text>

    <rect x="1160" y="405" width="220" height="72" rx="18" class="box-rose" filter="url(#shadow)"/>
    <text x="1270" y="433" class="text-main" text-anchor="middle">Execute</text>
    <text x="1270" y="455" class="text-small" text-anchor="middle">轻量（Simple/L1）</text>

    <!-- execution loop -->
    <rect x="690" y="620" width="220" height="72" rx="18" class="box-rose" filter="url(#shadow)"/>
    <text x="800" y="656" class="text-main" text-anchor="middle">Execute</text>

    <rect x="690" y="730" width="220" height="72" rx="18" class="box-green" filter="url(#shadow)"/>
    <text x="800" y="766" class="text-main" text-anchor="middle">Validate</text>
    <text x="800" y="788" class="text-small" text-anchor="middle">证据 / 复现</text>

    <rect x="690" y="840" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="800" y="876" class="text-main" text-anchor="middle">Review</text>
    <text x="800" y="898" class="text-small" text-anchor="middle">评分 + 整改</text>

    <!-- decision branch -->
    <rect x="1160" y="720" width="220" height="72" rx="18" class="box-amber" filter="url(#shadow)"/>
    <text x="1270" y="748" class="text-main" text-anchor="middle">提醒风险</text>
    <text x="1270" y="770" class="text-small" text-anchor="middle">征询是否返工</text>

    <rect x="1160" y="840" width="220" height="72" rx="18" class="box-green" filter="url(#shadow)"/>
    <text x="1270" y="868" class="text-main" text-anchor="middle">交付</text>
    <text x="1270" y="890" class="text-small" text-anchor="middle">更新 State</text>
  </g>
</svg>
