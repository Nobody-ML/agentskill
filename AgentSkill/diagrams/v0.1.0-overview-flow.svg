<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" width="100%" height="100%"
  style="background-color:#F8F9FA; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#F472B6"/>
    </marker>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E2E8F0"/>
    </pattern>
    <style>
      .box-amber { fill: #FEF7E0; stroke: #FDE68A; stroke-width: 2px; }
      .box-purple { fill: #EBE0FF; stroke: #D8B4FE; stroke-width: 2px; }
      .box-blue { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 2px; }
      .box-rose { fill: #FCE8E6; stroke: #FECACA; stroke-width: 2px; }
      .box-green { fill: #DCFCE7; stroke: #BBF7D0; stroke-width: 2px; }
      .box-group { fill: rgba(255, 255, 255, 0.45); stroke: #CBD5E1; stroke-width: 2px; stroke-dasharray: 8 8; }
      .text-title { font-size: 28px; font-weight: 800; fill: #111827; dominant-baseline: middle; letter-spacing: -0.5px; }
      .text-subtitle { font-size: 14px; font-weight: 500; fill: #4B5563; dominant-baseline: middle; }
      .text-group { font-size: 18px; font-weight: 700; fill: #DB2777; dominant-baseline: middle; }
      .text-main { font-size: 14px; font-weight: 600; fill: #1F2937; dominant-baseline: middle; letter-spacing: 0.2px; }
      .text-small { font-size: 12px; font-weight: 500; fill: #6B7280; dominant-baseline: middle; }
      .line { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-hl { stroke: #F472B6; stroke-width: 2.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#dot-grid)"/>

  <text x="80" y="70" class="text-title" text-anchor="start">v0.1.0 总流程（概览图）</text>
  <text x="80" y="104" class="text-subtitle" text-anchor="start">渐进式披露：Router 先做最小判定，再按需加载 Brainstorm/Research/Plan，最后进入执行闭环。</text>

  <!-- Groups -->
  <rect x="60" y="130" width="1480" height="340" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="156" class="text-group" text-anchor="start">Routing</text>

  <rect x="60" y="500" width="1480" height="400" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="526" class="text-group" text-anchor="start">Execution Loop</text>

  <!-- Nodes (w=220,h=72) -->
  <g>
    <rect x="720" y="170" width="220" height="72" rx="18" class="box-amber" filter="url(#shadow)"/>
    <text x="830" y="206" class="text-main" text-anchor="middle">用户输入 / 材料</text>

    <rect x="720" y="270" width="220" height="72" rx="18" class="box-amber" filter="url(#shadow)"/>
    <text x="830" y="306" class="text-main" text-anchor="middle">Router</text>
    <text x="830" y="328" class="text-small" text-anchor="middle">最小判定</text>

    <rect x="220" y="350" width="220" height="72" rx="18" class="box-purple" filter="url(#shadow)"/>
    <text x="330" y="386" class="text-main" text-anchor="middle">Brainstorm</text>

    <rect x="470" y="350" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="580" y="386" class="text-main" text-anchor="middle">Research</text>

    <rect x="720" y="350" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="830" y="386" class="text-main" text-anchor="middle">Plan</text>
    <text x="830" y="408" class="text-small" text-anchor="middle">产出 Plan/Task</text>

    <rect x="1140" y="350" width="220" height="72" rx="18" class="box-rose" filter="url(#shadow)"/>
    <text x="1250" y="386" class="text-main" text-anchor="middle">Execute（轻量）</text>
    <text x="1250" y="408" class="text-small" text-anchor="middle">简单任务</text>

    <!-- loop -->
    <rect x="720" y="580" width="220" height="72" rx="18" class="box-rose" filter="url(#shadow)"/>
    <text x="830" y="616" class="text-main" text-anchor="middle">Execute</text>

    <rect x="720" y="690" width="220" height="72" rx="18" class="box-green" filter="url(#shadow)"/>
    <text x="830" y="726" class="text-main" text-anchor="middle">Validate</text>
    <text x="830" y="748" class="text-small" text-anchor="middle">证据与复现</text>

    <rect x="720" y="800" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="830" y="836" class="text-main" text-anchor="middle">Review</text>
    <text x="830" y="858" class="text-small" text-anchor="middle">打分+整改</text>

    <rect x="1140" y="800" width="220" height="72" rx="18" class="box-green" filter="url(#shadow)"/>
    <text x="1250" y="836" class="text-main" text-anchor="middle">交付</text>
    <text x="1250" y="858" class="text-small" text-anchor="middle">更新 State</text>
  </g>

  <!-- Edges -->
  <g>
    <path d="M 830 242 V 270" class="line" marker-end="url(#arrow)"/>

    <!-- router fanout -->
    <path d="M 720 306 H 540 V 386 H 440" class="line" marker-end="url(#arrow)"/>
    <text x="560" y="374" class="text-small" text-anchor="start">方案不清</text>

    <path d="M 720 306 H 540 V 386 H 470" class="line" marker-end="url(#arrow)"/>
    <text x="560" y="396" class="text-small" text-anchor="start">需资料</text>

    <path d="M 830 342 V 350" class="line" marker-end="url(#arrow)"/>
    <text x="842" y="364" class="text-small" text-anchor="start">需规划</text>

    <path d="M 940 306 H 1040 V 386 H 1140" class="line" marker-end="url(#arrow)"/>
    <text x="1048" y="374" class="text-small" text-anchor="start">简单任务</text>

    <!-- brainstorm/research -> plan -->
    <path d="M 440 386 H 720" class="line" marker-end="url(#arrow)"/>
    <path d="M 690 386 H 720" class="line" marker-end="url(#arrow)"/>

    <!-- plan -> loop -->
    <path d="M 830 422 V 580" class="line" marker-end="url(#arrow)"/>

    <path d="M 830 652 V 690" class="line" marker-end="url(#arrow)"/>
    <path d="M 830 762 V 800" class="line" marker-end="url(#arrow)"/>

    <!-- review -> done -->
    <path d="M 940 836 H 1140" class="line" marker-end="url(#arrow)"/>
    <text x="1020" y="820" class="text-small" text-anchor="middle">通过</text>

    <!-- review -> plan (iterate) -->
    <path d="M 720 836 H 620 V 386 H 720" class="line-hl" marker-end="url(#arrow-hl)"/>
    <text x="520" y="636" class="text-small" text-anchor="start">未通过/需迭代</text>
  </g>
</svg>
