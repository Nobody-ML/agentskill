<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" width="100%" height="100%"
  style="background-color:#F8F9FA; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
    <!-- Arrowheads: refX=10 avoids tip intruding into nodes; pair with endpoint padding -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E2E8F0"/>
    </pattern>
    <style>
      .box-purple { fill: #EBE0FF; stroke: #D8B4FE; stroke-width: 2px; }
      .box-blue { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 2px; }
      .box-green { fill: #DCFCE7; stroke: #BBF7D0; stroke-width: 2px; }
      .box-group { fill: rgba(255, 255, 255, 0.45); stroke: #CBD5E1; stroke-width: 2px; stroke-dasharray: 8 8; }

      .text-title { font-size: 28px; font-weight: 800; fill: #111827; dominant-baseline: middle; letter-spacing: -0.5px; }
      .text-subtitle { font-size: 14px; font-weight: 500; fill: #4B5563; dominant-baseline: middle; }
      .text-main { font-size: 14px; font-weight: 600; fill: #1F2937; dominant-baseline: middle; letter-spacing: 0.2px; }
      .text-small { font-size: 12px; font-weight: 500; fill: #6B7280; dominant-baseline: middle; }

      .line { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .pill { fill: #FFFFFF; opacity: 0.82; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#dot-grid)"/>

  <text x="80" y="70" class="text-title" text-anchor="start">Brainstorm 流程图（示意）</text>
  <text x="80" y="104" class="text-subtitle" text-anchor="start">从目标与约束出发 → 提关键问题 → 方案对比 → 推荐与取舍 → 落盘结论 → 进入 Plan。</text>

  <rect x="60" y="140" width="1480" height="240" rx="24" class="box-group" filter="url(#shadow)"/>

  <!-- ====================================================== -->
  <!-- Edges (draw BEFORE nodes to avoid lines covering text) -->
  <!-- Endpoint padding used: EDGE_PAD=10                     -->
  <!-- ====================================================== -->
  <g>
    <path d="M 320 260 H 350" class="line" marker-end="url(#arrow)"/>
    <path d="M 580 260 H 610" class="line" marker-end="url(#arrow)"/>
    <path d="M 840 260 H 870" class="line" marker-end="url(#arrow)"/>
    <path d="M 1100 260 H 1130" class="line" marker-end="url(#arrow)"/>
    <path d="M 1360 260 H 1390" class="line" marker-end="url(#arrow)"/>
  </g>

  <!-- Nodes (w=220,h=72, gap=40, y=224) -->
  <g>
    <rect x="100" y="224" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="210" y="260" class="text-main" text-anchor="middle">复述目标/约束</text>

    <rect x="360" y="224" width="220" height="72" rx="18" class="box-purple" filter="url(#shadow)"/>
    <text x="470" y="252" class="text-main" text-anchor="middle">提 1–4 个关键问题</text>
    <text x="470" y="274" class="text-small" text-anchor="middle">stakeholders / concerns</text>

    <rect x="620" y="224" width="220" height="72" rx="18" class="box-purple" filter="url(#shadow)"/>
    <text x="730" y="252" class="text-main" text-anchor="middle">候选方案 2–3 个</text>
    <text x="730" y="274" class="text-small" text-anchor="middle">quality attributes</text>

    <rect x="880" y="224" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="990" y="252" class="text-main" text-anchor="middle">推荐 + 取舍</text>
    <text x="990" y="274" class="text-small" text-anchor="middle">ADR draft</text>

    <rect x="1140" y="224" width="220" height="72" rx="18" class="box-green" filter="url(#shadow)"/>
    <text x="1250" y="252" class="text-main" text-anchor="middle">整理可落盘结论</text>
    <text x="1250" y="274" class="text-small" text-anchor="middle">risk &amp; validation</text>

    <rect x="1400" y="224" width="140" height="72" rx="18" class="box-green" filter="url(#shadow)"/>
    <text x="1470" y="260" class="text-main" text-anchor="middle">进入 Plan</text>
  </g>
</svg>
