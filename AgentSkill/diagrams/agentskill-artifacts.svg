<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" width="100%" height="100%"
  style="background-color:#F8F9FA; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>

    <!-- Arrowheads: refX=10 avoids tip intruding into nodes; pair with endpoint padding -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#F472B6"/>
    </marker>

    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E2E8F0"/>
    </pattern>

    <style>
      .box-amber { fill: #FEF7E0; stroke: #FDE68A; stroke-width: 2px; }
      .box-purple { fill: #EBE0FF; stroke: #D8B4FE; stroke-width: 2px; }
      .box-blue { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 2px; }
      .box-rose { fill: #FCE8E6; stroke: #FECACA; stroke-width: 2px; }
      .box-green { fill: #DCFCE7; stroke: #BBF7D0; stroke-width: 2px; }
      .box-neutral { fill: #FFFFFF; stroke: #D1D5DB; stroke-width: 2px; }
      .box-group { fill: rgba(255, 255, 255, 0.45); stroke: #CBD5E1; stroke-width: 2px; stroke-dasharray: 8 8; }

      .text-title { font-size: 28px; font-weight: 800; fill: #111827; dominant-baseline: middle; letter-spacing: -0.5px; }
      .text-subtitle { font-size: 14px; font-weight: 500; fill: #4B5563; dominant-baseline: middle; }
      .text-group { font-size: 18px; font-weight: 700; fill: #DB2777; dominant-baseline: middle; }
      .text-main { font-size: 14px; font-weight: 600; fill: #1F2937; dominant-baseline: middle; letter-spacing: 0.2px; }
      .text-small { font-size: 12px; font-weight: 500; fill: #6B7280; dominant-baseline: middle; }

      .line { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-hl { stroke: #F472B6; stroke-width: 2.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-dashed { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 6; }

      .pill { fill: #FFFFFF; opacity: 0.82; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#dot-grid)"/>

  <!-- Title -->
  <text x="80" y="70" class="text-title" text-anchor="start">工件关系（State / Plan / Task / Evidence）</text>
  <text x="80" y="104" class="text-subtitle" text-anchor="start">目的：把“做了什么”变成“可追溯、可复查、可复现”的工程链路。</text>

  <!-- Groups -->
  <rect x="60" y="140" width="1480" height="160" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="166" class="text-group" text-anchor="start">All Stages（被 State 贯穿）</text>

  <rect x="60" y="320" width="1480" height="180" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="346" class="text-group" text-anchor="start">Delivery Pipeline（从计划到证据）</text>

  <rect x="60" y="520" width="1480" height="160" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="546" class="text-group" text-anchor="start">State Write-back（证据与结论回写）</text>

  <!-- ====================================================== -->
  <!-- Edges (draw BEFORE nodes to avoid lines covering text) -->
  <!-- Endpoint padding used: EDGE_PAD=10, Corner radius: R=12 -->
  <!-- ====================================================== -->
  <g>
    <!-- State -> All stages (routed outside to avoid crossing pipeline boxes) -->
    <path d="M 130 630 H 92 Q 80 630 80 618 V 248 Q 80 236 92 236 H 110" class="line-dashed" marker-end="url(#arrow)"/>
    <rect x="92" y="256" width="178" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="181" y="265" class="text-small" text-anchor="middle">稳定事实/决策/证据入口</text>

    <!-- Pipeline arrows (leave a small gap before target nodes) -->
    <path d="M 350 428 H 400" class="line" marker-end="url(#arrow)"/>
    <path d="M 630 428 H 680" class="line" marker-end="url(#arrow)"/>
    <path d="M 910 428 H 960" class="line" marker-end="url(#arrow)"/>
    <path d="M 1190 428 H 1240" class="line" marker-end="url(#arrow)"/>

    <!-- Evidence -> State (dedicated lane x=520 to avoid overlap with Review arrow) -->
    <path d="M 1080 464 V 510 Q 1080 520 1070 520 H 530 Q 520 520 520 530 V 620 Q 520 630 510 630 H 500" class="line-hl" marker-end="url(#arrow-hl)"/>
    <rect x="900" y="538" width="180" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="990" y="547" class="text-small" text-anchor="middle">证据索引回写</text>

    <!-- Review -> State (dedicated lane x=560; no shared vertical segments) -->
    <path d="M 1360 464 V 550 Q 1360 560 1350 560 H 570 Q 560 560 560 570 V 600 Q 560 610 550 610 H 500" class="line-hl" marker-end="url(#arrow-hl)"/>
    <rect x="1080" y="578" width="220" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1190" y="587" class="text-small" text-anchor="middle">评审结论/整改项回写</text>
  </g>

  <!-- Nodes -->
  <g>
    <!-- All stages -->
    <rect x="120" y="200" width="1360" height="72" rx="18" class="box-neutral" filter="url(#shadow)"/>
    <text x="800" y="228" class="text-main" text-anchor="middle">所有阶段（Router / Brainstorm / Research / Plan / Execute / Write / Validate / Review）</text>
    <text x="800" y="250" class="text-small" text-anchor="middle">State.md 提供稳定事实、约束、决策与证据入口；阶段读写后必须回写。</text>

    <!-- Pipeline row (w=220,h=72, gap=60, y=392) -->
    <rect x="130" y="392" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="240" y="428" class="text-main" text-anchor="middle">Plan.md</text>
    <text x="240" y="450" class="text-small" text-anchor="middle">验收/里程碑/验证方案</text>

    <rect x="410" y="392" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="520" y="428" class="text-main" text-anchor="middle">Task.md</text>
    <text x="520" y="450" class="text-small" text-anchor="middle">最小可验收任务</text>

    <rect x="690" y="392" width="220" height="72" rx="18" class="box-rose" filter="url(#shadow)"/>
    <text x="800" y="428" class="text-main" text-anchor="middle">执行产出</text>
    <text x="800" y="450" class="text-small" text-anchor="middle">代码/文稿/实验结果</text>

    <rect x="970" y="392" width="220" height="72" rx="18" class="box-green" filter="url(#shadow)"/>
    <text x="1080" y="428" class="text-main" text-anchor="middle">Evidence</text>
    <text x="1080" y="450" class="text-small" text-anchor="middle">测试/实验/引用/截图</text>

    <rect x="1250" y="392" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="1360" y="428" class="text-main" text-anchor="middle">Review</text>
    <text x="1360" y="450" class="text-small" text-anchor="middle">打分 + 整改结论</text>

    <!-- State (write-back) -->
    <rect x="130" y="588" width="360" height="84" rx="18" class="box-neutral" filter="url(#shadow)"/>
    <text x="310" y="622" class="text-main" text-anchor="middle">State.md</text>
    <text x="310" y="644" class="text-small" text-anchor="middle">SSOT：约束/决策/进度/证据索引</text>
  </g>
</svg>
