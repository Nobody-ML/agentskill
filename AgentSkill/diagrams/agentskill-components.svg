<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%"
  style="background-color:#F8F9FA; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>

    <!-- Arrowheads: refX=10 avoids tip intruding into nodes; pair with endpoint padding -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#F472B6"/>
    </marker>

    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E2E8F0"/>
    </pattern>

    <style>
      .box-amber { fill: #FEF7E0; stroke: #FDE68A; stroke-width: 2px; }
      .box-purple { fill: #EBE0FF; stroke: #D8B4FE; stroke-width: 2px; }
      .box-blue { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 2px; }
      .box-rose { fill: #FCE8E6; stroke: #FECACA; stroke-width: 2px; }
      .box-green { fill: #DCFCE7; stroke: #BBF7D0; stroke-width: 2px; }
      .box-neutral { fill: #FFFFFF; stroke: #D1D5DB; stroke-width: 2px; }
      .box-group { fill: rgba(255, 255, 255, 0.45); stroke: #CBD5E1; stroke-width: 2px; stroke-dasharray: 8 8; }

      .text-title { font-size: 28px; font-weight: 800; fill: #111827; dominant-baseline: middle; letter-spacing: -0.5px; }
      .text-subtitle { font-size: 14px; font-weight: 500; fill: #4B5563; dominant-baseline: middle; }
      .text-group { font-size: 18px; font-weight: 700; fill: #DB2777; dominant-baseline: middle; }
      .text-main { font-size: 14px; font-weight: 600; fill: #1F2937; dominant-baseline: middle; letter-spacing: 0.2px; }
      .text-small { font-size: 12px; font-weight: 500; fill: #6B7280; dominant-baseline: middle; }

      .line { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-hl { stroke: #F472B6; stroke-width: 2.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-dashed { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 6; }

      .pill { fill: #FFFFFF; opacity: 0.82; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#dot-grid)"/>

  <!-- Title -->
  <text x="80" y="70" class="text-title" text-anchor="start">总体架构：组件关系</text>
  <text x="80" y="104" class="text-subtitle" text-anchor="start">Router 负责路由；Plan→Execute→Validate→Review 形成闭环；State.md 与 templates/* 作为共享工件。</text>

  <!-- Groups -->
  <rect x="60" y="130" width="1480" height="420" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="156" class="text-group" text-anchor="start">Stages</text>

  <rect x="60" y="580" width="1480" height="260" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="606" class="text-group" text-anchor="start">Shared Artifacts</text>

  <!-- ====================================================== -->
  <!-- Edges (draw BEFORE nodes to avoid lines covering text) -->
  <!-- Endpoint padding used: EDGE_PAD=10, Corner radius: R=12 -->
  <!-- ====================================================== -->
  <g>
    <!-- Router fan-out -->
    <path d="M 190 290 V 272" class="line" marker-end="url(#arrow)"/>
    <path d="M 190 362 V 380" class="line" marker-end="url(#arrow)"/>

    <!-- Router -> Plan -->
    <path d="M 280 326 H 410" class="line" marker-end="url(#arrow)"/>

    <!-- Router -> Write (Track=Writing) -->
    <path d="M 280 326 H 328 Q 340 326 340 314 V 238 Q 340 226 352 226 H 730" class="line" marker-end="url(#arrow)"/>
    <rect x="352" y="204" width="116" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="410" y="213" class="text-small" text-anchor="middle">Track=Writing</text>

    <!-- Brainstorm/Research -> Plan (separate lanes to avoid overlap at Plan entry) -->
    <path d="M 280 226 H 328 Q 340 226 340 238 V 302 Q 340 314 352 314 H 410" class="line" marker-end="url(#arrow)"/>
    <path d="M 280 426 H 328 Q 340 426 340 414 V 350 Q 340 338 352 338 H 410" class="line" marker-end="url(#arrow)"/>

    <!-- Plan -> Execute -> Validate -> Review -->
    <path d="M 600 326 H 730" class="line" marker-end="url(#arrow)"/>
    <path d="M 920 326 H 1050" class="line" marker-end="url(#arrow)"/>
    <path d="M 1240 326 H 1370" class="line" marker-end="url(#arrow)"/>

    <!-- Write -> Validate -->
    <path d="M 920 226 H 988 Q 1000 226 1000 238 V 314 Q 1000 326 1012 326 H 1050" class="line" marker-end="url(#arrow)"/>

    <!-- Router -> Execute (direct) : dashed & routed around to keep arrows readable -->
    <path d="M 280 326 H 318 Q 330 326 330 338 V 488 Q 330 500 342 500 H 688 Q 700 500 700 488 V 364 Q 700 352 712 352 H 730" class="line-dashed" marker-end="url(#arrow)"/>
    <rect x="344" y="520" width="216" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="452" y="529" class="text-small" text-anchor="middle">已有 Plan/Task 或 Simple/L1 可直达</text>

    <!-- Review -> Plan (iteration) : highlighted & padded so arrowhead does not touch node -->
    <path d="M 1470 362 V 508 Q 1470 520 1458 520 H 522 Q 510 520 510 508 V 372" class="line-hl" marker-end="url(#arrow-hl)"/>
    <rect x="900" y="534" width="320" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1060" y="543" class="text-small" text-anchor="middle">迭代（整改/新信息）→ 回到 Plan</text>

    <!-- Shared artifacts connections (no arrowheads; keep subtle) -->
    <path d="M 750 660 V 572 Q 750 560 738 560 H 190 Q 178 560 178 548 V 372" class="line-dashed"/>
    <path d="M 750 660 V 572 Q 750 560 738 560 H 510 Q 498 560 498 548 V 372" class="line-dashed"/>
    <rect x="772" y="542" width="370" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="957" y="551" class="text-small" text-anchor="middle">State 被 Router/Plan/Execute/Validate/Review 读写</text>

    <path d="M 1220 660 V 584 Q 1220 572 1208 572 H 510 Q 498 572 498 560 V 372" class="line-dashed"/>
    <path d="M 1220 660 V 584 Q 1220 572 1232 572 H 1470 Q 1482 572 1482 560 V 372" class="line-dashed"/>
    <rect x="1240" y="554" width="220" height="18" rx="6" class="pill" filter="url(#shadow)"/>
    <text x="1350" y="563" class="text-small" text-anchor="middle">Templates 用于 Plan &amp; Review</text>
  </g>

  <!-- Nodes (w=180,h=72) -->
  <g>
    <!-- Router fan-out -->
    <rect x="100" y="190" width="180" height="72" rx="16" class="box-purple" filter="url(#shadow)"/>
    <text x="190" y="226" class="text-main" text-anchor="middle">Brainstorm</text>

    <rect x="100" y="290" width="180" height="72" rx="16" class="box-amber" filter="url(#shadow)"/>
    <text x="190" y="326" class="text-main" text-anchor="middle">Router</text>

    <rect x="100" y="390" width="180" height="72" rx="16" class="box-blue" filter="url(#shadow)"/>
    <text x="190" y="426" class="text-main" text-anchor="middle">Research</text>

    <!-- Main pipeline -->
    <rect x="420" y="290" width="180" height="72" rx="16" class="box-blue" filter="url(#shadow)"/>
    <text x="510" y="326" class="text-main" text-anchor="middle">Plan</text>

    <rect x="740" y="290" width="180" height="72" rx="16" class="box-rose" filter="url(#shadow)"/>
    <text x="830" y="326" class="text-main" text-anchor="middle">Execute</text>

    <rect x="1060" y="290" width="180" height="72" rx="16" class="box-green" filter="url(#shadow)"/>
    <text x="1150" y="326" class="text-main" text-anchor="middle">Validate</text>

    <rect x="1380" y="290" width="180" height="72" rx="16" class="box-blue" filter="url(#shadow)"/>
    <text x="1470" y="326" class="text-main" text-anchor="middle">Review</text>

    <!-- Writing branch -->
    <rect x="740" y="190" width="180" height="72" rx="16" class="box-purple" filter="url(#shadow)"/>
    <text x="830" y="226" class="text-main" text-anchor="middle">Write</text>

    <!-- Shared artifacts -->
    <rect x="560" y="660" width="380" height="84" rx="18" class="box-neutral" filter="url(#shadow)"/>
    <text x="750" y="694" class="text-main" text-anchor="middle">State.md</text>
    <text x="750" y="716" class="text-small" text-anchor="middle">SSOT：约束 / 决策 / 进度 / 证据索引</text>

    <rect x="1040" y="660" width="360" height="84" rx="18" class="box-neutral" filter="url(#shadow)"/>
    <text x="1220" y="694" class="text-main" text-anchor="middle">templates/*</text>
    <text x="1220" y="716" class="text-small" text-anchor="middle">Plan / Task / Rubric / AC / Repro</text>
  </g>
</svg>
