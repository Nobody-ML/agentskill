<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" width="100%" height="100%"
  style="background-color:#F8F9FA; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#F472B6"/>
    </marker>

    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E2E8F0"/>
    </pattern>

    <style>
      .box-amber { fill: #FEF7E0; stroke: #FDE68A; stroke-width: 2px; }
      .box-purple { fill: #EBE0FF; stroke: #D8B4FE; stroke-width: 2px; }
      .box-blue { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 2px; }
      .box-rose { fill: #FCE8E6; stroke: #FECACA; stroke-width: 2px; }
      .box-green { fill: #DCFCE7; stroke: #BBF7D0; stroke-width: 2px; }
      .box-neutral { fill: #FFFFFF; stroke: #D1D5DB; stroke-width: 2px; }
      .box-group { fill: rgba(255, 255, 255, 0.45); stroke: #CBD5E1; stroke-width: 2px; stroke-dasharray: 8 8; }

      .text-title { font-size: 28px; font-weight: 800; fill: #111827; dominant-baseline: middle; letter-spacing: -0.5px; }
      .text-subtitle { font-size: 14px; font-weight: 500; fill: #4B5563; dominant-baseline: middle; }
      .text-group { font-size: 18px; font-weight: 700; fill: #DB2777; dominant-baseline: middle; }
      .text-main { font-size: 14px; font-weight: 600; fill: #1F2937; dominant-baseline: middle; letter-spacing: 0.2px; }
      .text-small { font-size: 12px; font-weight: 500; fill: #6B7280; dominant-baseline: middle; }

      .line { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-hl { stroke: #F472B6; stroke-width: 2.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-dashed { stroke: #9CA3AF; stroke-width: 1.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#dot-grid)"/>

  <!-- Title -->
  <text x="80" y="70" class="text-title" text-anchor="start">状态机（FSM）：阶段如何串起来</text>
  <text x="80" y="104" class="text-subtitle" text-anchor="start">Router 是入口；Plan → 执行授权 → Execute/Write → Validate → Review 是主链路；Review 的结论决定是否返工回环。</text>

  <!-- Group -->
  <rect x="60" y="140" width="1480" height="740" rx="24" class="box-group" filter="url(#shadow)"/>
  <text x="84" y="166" class="text-group" text-anchor="start">Main States</text>

  <!-- Nodes (w=220,h=72) -->
  <g>
    <!-- start -->
    <circle cx="220" cy="210" r="18" fill="#111827" opacity="0.18"/>
    <circle cx="220" cy="210" r="10" fill="#111827" opacity="0.35"/>
    <text x="250" y="210" class="text-small" text-anchor="start">[*]</text>

    <!-- router -->
    <rect x="580" y="174" width="220" height="72" rx="18" class="box-amber" filter="url(#shadow)"/>
    <text x="690" y="210" class="text-main" text-anchor="middle">Router</text>

    <!-- brainstorm / research -->
    <rect x="240" y="290" width="220" height="72" rx="18" class="box-purple" filter="url(#shadow)"/>
    <text x="350" y="326" class="text-main" text-anchor="middle">Brainstorm</text>

    <rect x="920" y="290" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="1030" y="326" class="text-main" text-anchor="middle">Research</text>

    <!-- plan -->
    <rect x="580" y="320" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="690" y="356" class="text-main" text-anchor="middle">Plan</text>

    <!-- auth gate -->
    <polygon points="690,410 730,430 690,450 650,430" class="box-neutral" filter="url(#shadow)"/>
    <text x="690" y="426" class="text-small" text-anchor="middle">执行授权</text>
    <text x="690" y="444" class="text-small" text-anchor="middle">开始执行?</text>

    <!-- execute / write -->
    <rect x="410" y="470" width="220" height="72" rx="18" class="box-rose" filter="url(#shadow)"/>
    <text x="520" y="506" class="text-main" text-anchor="middle">Execute</text>

    <rect x="770" y="470" width="220" height="72" rx="18" class="box-purple" filter="url(#shadow)"/>
    <text x="880" y="506" class="text-main" text-anchor="middle">Write</text>

    <!-- validate / review -->
    <rect x="580" y="600" width="220" height="72" rx="18" class="box-green" filter="url(#shadow)"/>
    <text x="690" y="636" class="text-main" text-anchor="middle">Validate</text>

    <rect x="580" y="720" width="220" height="72" rx="18" class="box-blue" filter="url(#shadow)"/>
    <text x="690" y="756" class="text-main" text-anchor="middle">Review</text>

    <!-- end -->
    <circle cx="1260" cy="756" r="18" fill="#111827" opacity="0.18"/>
    <circle cx="1260" cy="756" r="10" fill="#111827" opacity="0.35"/>
    <text x="1290" y="756" class="text-small" text-anchor="start">[*]</text>
  </g>

  <!-- Edges -->
  <g>
    <!-- start -> router -->
    <path d="M 238 210 H 580" class="line" marker-end="url(#arrow)"/>

    <!-- router branches -->
    <path d="M 580 210 H 520 V 326 H 460" class="line" marker-end="url(#arrow)"/>
    <text x="520" y="244" class="text-small" text-anchor="start">方向/方案不清</text>

    <path d="M 800 210 H 860 V 326 H 920" class="line" marker-end="url(#arrow)"/>
    <text x="860" y="244" class="text-small" text-anchor="start">缺资料/需证据</text>

    <path d="M 690 246 V 320" class="line" marker-end="url(#arrow)"/>
    <text x="702" y="288" class="text-small" text-anchor="start">Level≥L2</text>

    <path d="M 800 210 H 980 V 506 H 630" class="line-dashed" marker-end="url(#arrow)"/>
    <text x="980" y="242" class="text-small" text-anchor="start">Simple/L1（可直达）</text>

    <!-- brainstorm/research -> plan -->
    <path d="M 460 326 H 520 V 356 H 580" class="line" marker-end="url(#arrow)"/>
    <path d="M 920 326 H 860 V 356 H 800" class="line" marker-end="url(#arrow)"/>

    <!-- plan -> auth gate -->
    <path d="M 690 392 V 400" class="line" marker-end="url(#arrow)"/>

    <!-- auth gate -> execute / write -->
    <path d="M 690 460 V 470 H 630" class="line" marker-end="url(#arrow)"/>
    <path d="M 690 460 V 470 H 770" class="line" marker-end="url(#arrow)"/>
    <text x="712" y="438" class="text-small" text-anchor="start">授权后 Track=Writing → Write</text>

    <!-- execute/write -> validate -->
    <path d="M 520 542 V 636 H 580" class="line" marker-end="url(#arrow)"/>
    <path d="M 880 542 V 636 H 800" class="line" marker-end="url(#arrow)"/>

    <!-- validate -> review -->
    <path d="M 690 672 V 720" class="line" marker-end="url(#arrow)"/>

    <!-- review outcomes -->
    <path d="M 800 756 H 1242" class="line" marker-end="url(#arrow)"/>
    <text x="980" y="740" class="text-small" text-anchor="middle">PASS（交付）</text>

    <path d="M 580 756 H 520 V 506 H 630" class="line-hl" marker-end="url(#arrow-hl)"/>
    <text x="420" y="612" class="text-small" text-anchor="start">BLOCKED（验证失败）</text>

    <path d="M 690 720 V 660 Q 690 648 678 648 H 420 Q 408 648 408 636 V 392 Q 408 380 420 380 H 580" class="line-hl" marker-end="url(#arrow-hl)"/>
    <text x="520" y="628" class="text-small" text-anchor="middle">NEEDS_USER_DECISION（用户选择返工）</text>
  </g>
</svg>
